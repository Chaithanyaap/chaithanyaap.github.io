<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaithanya Kumar | Infrastructure Engineer</title>

<style>
body {
  margin:0;
  font-family: Consolas, monospace;
  background:#0d1117;
  color:#c9d1d9;
}

/* HEADER */
header {
  max-width:1000px;
  margin:40px auto;
  padding:25px;
  border-radius:12px;
  background:#161b22;
  border:1px solid #30363d;
}

#terminal {
  color:#58a6ff;
  font-size:18px;
  white-space:pre-line;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
  background:#161b22;
  border-top:1px solid #30363d;
  border-bottom:1px solid #30363d;
}

nav a {
  color:#58a6ff;
  text-decoration:none;
}

/* SECTION */
section {
  max-width:1000px;
  margin:40px auto;
  padding:25px;
  background:#161b22;
  border-radius:12px;
  border:1px solid #30363d;
}

h2 {
  color:#58a6ff;
  margin-bottom:15px;
}

/* CARD */
.card {
  background:#0d1117;
  padding:18px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #30363d;
  transition:0.25s;
}

.card:hover {
  border-color:#58a6ff;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.badge {
  background:#21262d;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

/* EXPERIENCE */
.card ul {
  margin-top:10px;
  padding-left:18px;
  line-height:1.6;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  color:#8b949e;
}
</style>
</head>

<body>

<header>
  <div id="terminal"></div>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#automation">Automation</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About</h2>
  <div class="card" id="about"></div>
</section>

<section id="experience">
  <h2>Professional Experience</h2>
  <div id="experience-container"></div>
</section>

<section id="automation">
  <h2>Automation & Tools</h2>
  <div id="automation-container" class="grid"></div>
</section>

<section id="skills">
  <h2>Technical Skills</h2>
  <div id="skills-container" class="grid"></div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card" id="contact-container"></div>
</section>

<footer>
  <p>© 2026 Chaithanya Kumar</p>
</footer>

<script>
// TERMINAL HEADER
const text = "$ whoami\nChaithanya Kumar\nSenior VMware & Cloud Engineer\n$ specialization: Virtualization | OCI | Automation";
let i = 0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("terminal").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 25);
  }
}
typeEffect();

// LOAD DATA
fetch('data.json')
.then(res => res.json())
.then(data => {

  document.getElementById("about").innerText = data.about;

  // EXPERIENCE
  data.experience.forEach(job => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${job.role} - ${job.company}</h3>
      <p><i>${job.duration}</i></p>
      <ul>${job.points.map(p => `<li>${p}</li>`).join("")}</ul>
    `;

    document.getElementById("experience-container").appendChild(div);
  });

  // AUTOMATION
  data.automation.forEach(tool => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${tool.name}</strong>
      <p>${tool.description}</p>
    `;

    document.getElementById("automation-container").appendChild(div);
  });

  // SKILLS
  data.skills.forEach(skill => {
    let div = document.createElement("div");
    div.className = "badge";
    div.innerText = skill;

    document.getElementById("skills-container").appendChild(div);
  });

  // CONTACT
  document.getElementById("contact-container").innerHTML = `
    <p>📍 ${data.location}</p>
    <p>📞 ${data.phone}</p>
    <p>✉️ ${data.email}</p>
  `;
});
</script>

</body>
</html>
