<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaithanya Kumar | Infrastructure Engineer</title>

<style>
body {
  margin:0;
  font-family: Consolas, monospace;
  background:#0d1117;
  color:#c9d1d9;
  overflow-x:hidden;
}

/* BACKGROUND */
#bg {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

header, nav, section, footer {
  position:relative;
  z-index:1;
}

/* HEADER */
header {
  max-width:1000px;
  margin:40px auto;
  padding:25px;
  background:#161b22cc;
  border-radius:12px;
  border:1px solid #30363d;
}

#terminal {
  color:#58a6ff;
  white-space:pre-line;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
  background:#161b22cc;
}

nav a {
  color:#58a6ff;
  text-decoration:none;
}

/* SECTION */
section {
  max-width:1000px;
  margin:40px auto;
  padding:25px;
  background:#161b22cc;
  border-radius:12px;
  border:1px solid #30363d;
}

h2 { color:#58a6ff; }

/* CARD */
.card {
  background:#0d1117;
  padding:18px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #30363d;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.badge {
  background:#21262d;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

/* CONTACT */
.contact-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.contact-box {
  background:#0d1117;
  padding:20px;
  border-radius:10px;
  border:1px solid #30363d;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:10px 16px;
  margin-top:10px;
  background:#238636;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
}

.linkedin { background:#0a66c2; }

footer {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <div id="terminal"></div>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#automation">Automation</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About</h2>
  <div class="card" id="about-content"></div>
</section>

<section id="experience">
  <h2>Experience</h2>
  <div id="experience-container"></div>
</section>

<section id="automation">
  <h2>Automation</h2>
  <div id="automation-container" class="grid"></div>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div id="skills-container" class="grid"></div>
</section>

<section id="contact">
  <h2>Get In Touch</h2>
  <div class="contact-grid">

    <div class="contact-box">
      <h3>📞 Contact Details</h3>
      <a href="mailto:kchaithanyaa77@gmail.com" class="btn">Email Me</a><br>
      <a href="tel:6366693936" class="btn">Call Me</a>
    </div>

    <div class="contact-box">
      <h3>🌐 LinkedIn</h3>
      <a href="https://www.linkedin.com" target="_blank" class="btn linkedin">
        View Profile
      </a>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Chaithanya Kumar</p>
</footer>

<script>
// TERMINAL EFFECT
const text = `$ whoami
Chaithanya Kumar
Senior VMware & Cloud Engineer
$ status: actively open for opportunities`;

let i = 0;
function type(){
  if(i < text.length){
    document.getElementById("terminal").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 20);
  }
}
type();

// LOAD DATA
fetch('data.json')
.then(r => r.json())
.then(data => {

  document.getElementById("about-content").innerText = data.about;

  data.experience.forEach(job => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${job.role} - ${job.company}</h3>
      <p>${job.duration}</p>
      <ul>${job.points.map(p => `<li>${p}</li>`).join("")}</ul>
    `;
    document.getElementById("experience-container").appendChild(div);
  });

  data.automation.forEach(t => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${t.name}</b><p>${t.description}</p>`;
    document.getElementById("automation-container").appendChild(div);
  });

  data.skills.forEach(s => {
    let div = document.createElement("div");
    div.className = "badge";
    div.innerText = s;
    document.getElementById("skills-container").appendChild(div);
  });

});

// 🌐 SERVER / NETWORK BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let nodes = [];

for(let i=0;i<50;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(n => {

    // Draw node
    ctx.beginPath();
    ctx.arc(n.x, n.y, 3, 0, Math.PI*2);
    ctx.fillStyle = "#58a6ff";
    ctx.fill();

    // Connections
    nodes.forEach(m => {
      let dx = n.x - m.x;
      let dy = n.y - m.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 130){
        ctx.beginPath();
        ctx.moveTo(n.x, n.y);
        ctx.lineTo(m.x, m.y);
        ctx.strokeStyle = "rgba(88,166,255,0.15)";
        ctx.stroke();
      }
    });

    // Move
    n.x += n.vx;
    n.y += n.vy;

    if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
    if(n.y < 0 || n.y > canvas.height) n.vy *= -1;
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
