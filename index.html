<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaithanyaa | System Administrator</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Consolas, monospace;
      background-color: #0d1117;
      color: #c9d1d9;
      scroll-behavior: smooth;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    #terminal {
      font-size: 28px;
      color: #58a6ff;
      white-space: pre-line;
    }

    nav {
      text-align: center;
      padding: 15px;
      background: #0d1117;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #30363d;
    }

    nav a {
      color: #58a6ff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    section {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      border-bottom: 1px solid #30363d;
      padding-bottom: 5px;
      color: #58a6ff;
    }

    .card {
      background: #161b22;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #30363d;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #238636;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #30363d;
      color: #8b949e;
    }
  </style>
</head>

<body>

<header>
  <h1 id="terminal"></h1>
</header>

<!-- ✅ UPDATED NAVIGATION -->
<nav>
  <a href="/">Home</a>
  <a href="/skill/">Skill</a>
  <a href="/experience/">Experience</a>
  <a href="/automation/">automation</a>
  <a href="/contact/">Contact</a>
</nav>

<!-- HOME / ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <div class="card">
    <p>
      System Administrator with hands-on experience in virtualization,
      infrastructure management, and troubleshooting enterprise systems.
      Passionate about learning new technologies including AI tools.
    </p>
  </div>
</section>


<footer>
  <p>© 2026 Chaithanyaa | System Administrator</p>
</footer>

<!-- Terminal Animation -->
<script>
  const text = "$ whoami\nChaithanyaa - System Administrator";
  let i = 0;

  function typeEffect() {
    if (i < text.length) {
      document.getElementById("terminal").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 50);
    }
  }

  window.onload = typeEffect;
</script>

</body>
</html>
