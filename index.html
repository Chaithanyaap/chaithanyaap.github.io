<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaithanyaa | Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      font-size: 18px;
      opacity: 0.9;
    }

    nav {
      text-align: center;
      background: #111827;
      padding: 10px;
    }

    nav a {
      color: #9ca3af;
      margin: 10px;
      text-decoration: none;
      font-size: 16px;
    }

    nav a:hover {
      color: white;
    }

    section {
      padding: 50px 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1f2933;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      font-size: 14px;
      color: #9ca3af;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

<header>
  <h1>Hi, I'm Chaithanyaa 👋</h1>
  <p>Welcome to my website hosted on GitHub</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About Me</h2>
  <div class="card">
    <p>I am learning web development and building cool projects.</p>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="card">
    <p>🚀 Project 1 - My first website</p>
    <p>📱 Project 2 - Coming soon...</p>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: your@email.com</p>
    <button onclick="alert('Thanks for visiting!')">Say Hi</button>
  </div>
</section>

<footer>
  <p>© 2026 Chaithanyaa | Built with HTML</p>
</footer>

</body>
</html>
