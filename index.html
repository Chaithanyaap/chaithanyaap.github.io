<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaithanya Kumar | VMware Administrator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', monospace;
  background: #0d1117;
  color: #c9d1d9;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: #161b22;
  padding: 15px;
  position: sticky;
  top: 0;
}
nav a {
  color: #58a6ff;
  text-decoration: none;
  font-weight: bold;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px;
}
header h1 {
  font-size: 28px;
  color: #58a6ff;
}
header p {
  color: #8b949e;
}

/* SECTIONS */
section {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

h2 {
  border-bottom: 1px solid #30363d;
  padding-bottom: 5px;
  color: #58a6ff;
}

/* CARDS */
.card {
  background: #161b22;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid #30363d;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px rgba(88,166,255,0.3);
}

/* SKILLS GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 10px;
}

/* BADGE */
.badge {
  background: #21262d;
  padding: 8px;
  border-radius: 6px;
  text-align: center;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #8b949e;
}
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#automation">Automation</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<header>
  <h1 id="name">Loading...</h1>
  <p id="title"></p>
</header>

<section id="about">
  <h2>About</h2>
  <div class="card"><p id="about-text"></p></div>
</section>

<section id="experience">
  <h2>Experience</h2>
  <div id="experience-container"></div>
</section>

<section id="automation">
  <h2>Automation & PowerShell</h2>
  <div id="automation-container"></div>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div id="skills-container" class="grid"></div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card" id="contact-container"></div>
</section>

<footer>
  <p>© 2026 Chaithanya Kumar</p>
</footer>

<script>
fetch('data.json')
.then(res => res.json())
.then(data => {

  document.getElementById("name").textContent = data.name;
  document.getElementById("title").textContent = data.title;
  document.getElementById("about-text").textContent = data.about;

  // EXPERIENCE
  data.experience.forEach(job => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${job.role} - ${job.company}</h3>
      <p><i>${job.duration}</i></p>
      <ul>${job.points.map(p => `<li>${p}</li>`).join("")}</ul>
    `;
    document.getElementById("experience-container").appendChild(div);
  });

  // AUTOMATION
  data.automation.forEach(tool => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3><i class="fa-solid fa-terminal"></i> ${tool.name}</h3>
      <p>${tool.description}</p>
    `;
    document.getElementById("automation-container").appendChild(div);
  });

  // SKILLS
  data.skills.forEach(skill => {
    const div = document.createElement("div");
    div.className = "badge";
    div.textContent = skill;
    document.getElementById("skills-container").appendChild(div);
  });

  // CONTACT
  document.getElementById("contact-container").innerHTML = `
    <p>📍 ${data.location}</p>
    <p>📞 ${data.phone}</p>
    <p>✉️ ${data.email}</p>
  `;
});
</script>

</body>
</html>
