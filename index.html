<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaithanya Kumar | VMware Engineer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: #c9d1d9;
}

header {
  text-align: center;
  padding: 40px;
}

section {
  max-width: 1000px;
  margin: 40px auto;
  padding: 20px;
}

h2 {
  color: #58a6ff;
  border-bottom: 1px solid #30363d;
}

.card {
  background: #161b22;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}

ul {
  padding-left: 20px;
  line-height: 1.6;
}

.badge {
  display: inline-block;
  margin: 5px;
  padding: 8px;
  background: #21262d;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
  <h1 id="name"></h1>
  <p id="title"></p>
</header>

<section>
  <h2>About</h2>
  <div class="card"><p id="about-text"></p></div>
</section>

<section>
  <h2>Experience</h2>
  <div id="experience"></div>
</section>

<section>
  <h2>Automation</h2>
  <div id="automation"></div>
</section>

<section>
  <h2>Skills</h2>
  <div id="skills"></div>
</section>

<section>
  <h2>Contact</h2>
  <div class="card" id="contact"></div>
</section>

<script>
fetch('data.json')
.then(res=>res.json())
.then(data=>{

document.getElementById("name").innerText=data.name;
document.getElementById("title").innerText=data.title;
document.getElementById("about-text").innerText=data.about;

// EXPERIENCE
data.experience.forEach(job=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<h3>${job.role} - ${job.company}</h3>
<p><i>${job.duration}</i></p>
<ul>${job.points.map(p=>`<li>${p}</li>`).join("")}</ul>
`;
document.getElementById("experience").appendChild(div);
});

// AUTOMATION
data.automation.forEach(tool=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<h3>${tool.name}</h3><p>${tool.description}</p>`;
document.getElementById("automation").appendChild(div);
});

// SKILLS
data.skills.forEach(skill=>{
let span=document.createElement("span");
span.className="badge";
span.innerText=skill;
document.getElementById("skills").appendChild(span);
});

// CONTACT
document.getElementById("contact").innerHTML=`
<p>📍 ${data.location}</p>
<p>📞 ${data.phone}</p>
<p>✉️ ${data.email}</p>
`;

});
</script>

</body>
</html>
