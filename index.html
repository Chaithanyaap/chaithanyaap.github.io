<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaithanya Kumar | Infrastructure Engineer</title>

<style>
body {
  margin:0;
  font-family: Consolas, monospace;
  background:#0d1117;
  color:#c9d1d9;
}

/* HERO */
.hero-banner {
  max-width:1000px;
  margin:20px auto;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#161b22;
  border-radius:12px;
}

.dot {
  width:10px;
  height:10px;
  background:#3fb950;
  border-radius:50%;
}

/* NAV */
nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
}

nav a {
  color:#58a6ff;
  text-decoration:none;
}

/* SECTION */
section {
  max-width:1000px;
  margin:30px auto;
  padding:20px;
  background:#161b22;
  border-radius:10px;
}

.card {
  background:#0d1117;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  border:1px solid #30363d;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
}

.badge {
  background:#21262d;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

.btn {
  display:inline-block;
  padding:8px 12px;
  margin-top:10px;
  background:#238636;
  color:white;
  text-decoration:none;
  border-radius:6px;
  font-size:13px;
}

.linkedin {
  background:#0a66c2;
}

footer {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<div class="hero-banner">
  <div>
    <h2 id="name"></h2>
    <p id="title"></p>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="dot"></div>
    Available for Hire
  </div>
</div>

<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#automation">Automation</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About</h2>
  <div class="card" id="about-content"></div>
</section>

<section id="experience">
  <h2>Experience</h2>
  <div id="experience-container"></div>
</section>

<section id="automation">
  <h2>Automation</h2>
  <div id="automation-container" class="grid"></div>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div id="skills-container" class="grid"></div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: <span id="email"></span></p>
    <p>Phone: <span id="phone"></span></p>
  </div>
</section>

<footer>
  <p>© 2026 Chaithanya Kumar</p>
</footer>

<script>
// LOAD DATA
fetch('data.json')
.then(r => r.json())
.then(data => {

  document.getElementById("name").innerText = data.name;
  document.getElementById("title").innerText = data.title;
  document.getElementById("about-content").innerText = data.about;
  document.getElementById("email").innerText = data.email;
  document.getElementById("phone").innerText = data.phone;

  // EXPERIENCE
  data.experience.forEach(job => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${job.role} - ${job.company}</h3>
      <p>${job.duration}</p>
      <ul>${job.points.map(p => `<li>${p}</li>`).join("")}</ul>
    `;
    document.getElementById("experience-container").appendChild(div);
  });

  // AUTOMATION WITH ALL LINKS
  data.automation.forEach(t => {
    let div = document.createElement("div");
    div.className = "card";

    let extraLink = "";

    const name = t.name.toLowerCase();

    if (name.includes("patch")) {
      extraLink = `<a href="https://github.com/Chaithanyaap/chaithanyaap.github.io/issues/1" target="_blank" class="btn linkedin">📄 View Report</a>`;
    }

    if (name.includes("inventory")) {
      extraLink = `<a href="https://github.com/Chaithanyaap/chaithanyaap.github.io/issues/2" target="_blank" class="btn">📊 View Inventory</a>`;
    }

    if (name.includes("health")) {
      extraLink = `<a href="#" class="btn">🔍 View Health Checks</a>`;
    }

    if (name.includes("citrix")) {
      extraLink = `<a href="#" class="btn">🚀 View Migration Tool</a>`;
    }

    if (name.includes("ram")) {
      extraLink = `<a href="#" class="btn">⚡ View RAM Tool</a>`;
    }

    if (name.includes("hardware")) {
      extraLink = `<a href="#" class="btn">🖥️ View Upgrade Tool</a>`;
    }

    if (name.includes("keepass")) {
      extraLink = `<a href="#" class="btn">🔐 View Tool</a>`;
    }

    div.innerHTML = `
      <b>${t.name}</b>
      <p>${t.description}</p>
      ${extraLink}
    `;

    document.getElementById("automation-container").appendChild(div);
  });

  // SKILLS
  data.skills.forEach(s => {
    let div = document.createElement("div");
    div.className = "badge";
    div.innerText = s;
    document.getElementById("skills-container").appendChild(div);
  });

});
</script>

</body>
</html>
