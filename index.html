<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaithanya Kumar | Infrastructure Engineer</title>

<style>
body {
  margin:0;
  font-family: Consolas, monospace;
  background:#0d1117;
  color:#c9d1d9;
  overflow-x:hidden;
}

#bg {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

header, nav, section, footer {
  position:relative;
  z-index:1;
}

.hero-banner {
  max-width:1000px;
  margin:20px auto;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(135deg,#161b22,#0d1117);
  border:1px solid #30363d;
  border-radius:12px;
}

.dot {
  width:10px;
  height:10px;
  background:#3fb950;
  border-radius:50%;
  box-shadow:0 0 10px #3fb950;
}

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
  background:#161b22cc;
}

nav a {
  color:#58a6ff;
  text-decoration:none;
}

section {
  max-width:1000px;
  margin:40px auto;
  padding:25px;
  background:#161b22cc;
  border-radius:12px;
  border:1px solid #30363d;
}

h2 { color:#58a6ff; }

.card {
  background:#0d1117;
  padding:18px;
  margin-top:15px;
  border-radius:10px;
  border:1px solid #30363d;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.badge {
  background:#21262d;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

.btn {
  display:inline-block;
  padding:8px 12px;
  margin-top:10px;
  background:#238636;
  color:white;
  text-decoration:none;
  border-radius:6px;
}

.linkedin { background:#0a66c2; }

footer {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero-banner">
  <div>
    <h2 id="name"></h2>
    <p id="title"></p>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="dot"></div>
    Available for Hire
  </div>
</div>

<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#automation">Automation</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About</h2>
  <div class="card" id="about-content"></div>
</section>

<section id="experience">
  <h2>Experience</h2>
  <div id="experience-container"></div>
</section>

<section id="automation">
  <h2>Automation</h2>
  <div id="automation-container" class="grid"></div>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div id="skills-container" class="grid"></div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: <span id="email"></span></p>
    <p>Phone: <span id="phone"></span></p>
  </div>
</section>

<footer>
  <p>© 2026 Chaithanya Kumar</p>
</footer>

<script>
// LOAD DATA
fetch('data.json')
.then(r => r.json())
.then(data => {

  document.getElementById("name").innerText = data.name;
  document.getElementById("title").innerText = data.title;
  document.getElementById("about-content").innerText = data.about;
  document.getElementById("email").innerText = data.email;
  document.getElementById("phone").innerText = data.phone;

  // EXPERIENCE
  data.experience.forEach(job => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${job.role} - ${job.company}</h3>
      <p>${job.duration}</p>
      <ul>${job.points.map(p => `<li>${p}</li>`).join("")}</ul>
    `;
    document.getElementById("experience-container").appendChild(div);
  });

  // AUTOMATION (🔥 UPDATED)
  data.automation.forEach(t => {
    let div = document.createElement("div");
    div.className = "card";

    let extraLink = "";

    if (t.name.toLowerCase().includes("patch")) {
      extraLink = `
        <a href="https://github.com/Chaithanyaap/chaithanyaap.github.io/issues/1"
           target="_blank"
           class="btn linkedin">
           📄 View Report
        </a>
      `;
    }

    div.innerHTML = `
      <b>${t.name}</b>
      <p>${t.description}</p>
      ${extraLink}
    `;

    document.getElementById("automation-container").appendChild(div);
  });

  // SKILLS
  data.skills.forEach(s => {
    let div = document.createElement("div");
    div.className = "badge";
    div.innerText = s;
    document.getElementById("skills-container").appendChild(div);
  });

});

// BACKGROUND (same as yours)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes=[];
for(let i=0;i<40;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(n=>{
    ctx.beginPath();
    ctx.arc(n.x,n.y,3,0,Math.PI*2);
    ctx.fillStyle="#58a6ff";
    ctx.fill();

    n.x+=n.vx;
    n.y+=n.vy;
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
